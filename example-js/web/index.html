<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>example-js</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; color: #f1f5f9; font-family: system-ui, -apple-system, sans-serif; }
      #gameCanvas { width: 100%; height: 100%; display: block; touch-action: none; outline: none; }
      #scoreboard {
        position: absolute;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 48px;
        font-size: 56px;
        font-weight: 700;
        letter-spacing: 0.1em;
        user-select: none;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>
    <div id="scoreboard"><span id="playerScore">0</span><span id="aiScore">0</span></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
